    /* Critical CSS for Hero Section */
    .hero { height: 90vh; min-height: 600px; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; color: #ffffff; overflow: hidden; background-color: #121212; }
    .hero-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
    .hero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.8)); z-index: 2; }
    .hero-content { position: relative; z-index: 2; max-width: 900px; padding: 0 2rem; }
    .hero-tag { display: block; font-size: 1rem; font-weight: 800; color: #FED100; letter-spacing: 4px; margin-bottom: 2rem; }
    .hero-content h1 { font-size: 5rem; font-weight: 900; margin-bottom: 2rem; color: #ffffff; text-transform: uppercase; letter-spacing: -2px; line-height: 1; }
    @media (max-width: 768px) { .hero-content h1 { font-size: 2.5rem; } }
  </style>
