<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <a routerLink="/" (click)="closeMenu()">TRAIL PEAK</a>
        </div>
        
        <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen" aria-label="Toggle mobile menu" [attr.aria-expanded]="isMenuOpen">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="nav-content" [class.active]="isMenuOpen">
            <ul class="nav-links" *ngIf="!authService.isAdmin()">
                <li *ngIf="!isActive('/')"><a routerLink="/" routerLinkActive="active"
                        [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Home</a></li>
                <li *ngIf="!isActive('/shop')"><a routerLink="/shop" routerLinkActive="active" (click)="closeMenu()">Shop</a></li>
                <li *ngIf="!isActive('/cart')"><a routerLink="/cart" routerLinkActive="active" class="cart-link" (click)="closeMenu()" aria-label="Shopping Cart">
                        <svg class="cart-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                        Cart <span *ngIf="cartItemCount > 0" class="cart-badge">{{cartItemCount}}</span>
                    </a></li>
                <li *ngIf="!isActive('/about')"><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a></li>
                <li *ngIf="authService.isLoggedIn() && !isActive('/dashboard')"><a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a></li>
                <li class="dropdown">
                    <a class="dropbtn" role="button" aria-haspopup="true">Info <span class="arrow" aria-hidden="true">▼</span></a>
                    <div class="dropdown-content">
                        <a routerLink="/contact" (click)="closeMenu()">Contact / Feedback</a>
                        <a routerLink="/privacy-policy" (click)="closeMenu()">Privacy Policy</a>
                        <a routerLink="/accessibility" (click)="closeMenu()">Accessibility</a>
                    </div>
                </li>
            </ul>
            <div class="nav-auth">
                <a *ngIf="authService.isAdmin()" routerLink="/admin" (click)="closeMenu()" class="btn-track" style="color: var(--jamaica-green); border: 1px solid var(--jamaica-green); padding: 5px 10px; border-radius: 5px; margin-right: 10px;">Admin Panel</a>
                <a *ngIf="!isActive('/order-processing') && !authService.isAdmin()" routerLink="/order-processing" (click)="closeMenu()" class="btn-track">Track Order</a>
                <ng-container *ngIf="!authService.isLoggedIn()">
                    <a *ngIf="!isActive('/login')" routerLink="/login" (click)="closeMenu()" class="btn-login">Login</a>
                    <a *ngIf="!isActive('/register')" routerLink="/register" (click)="closeMenu()" class="btn-register">Join Free</a>
                </ng-container>
                <ng-container *ngIf="authService.isLoggedIn()">
                    <span class="welcome-text">Welcome, {{userName}}</span>
                    <button (click)="onLogout(); closeMenu()" class="btn-register" style="border:none; cursor:pointer;">Logout</button>
                </ng-container>
                
                <!-- Theme Toggle -->
                <button class="theme-toggle" (click)="toggleTheme()" [title]="themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'" aria-label="Toggle color theme">
                    <svg *ngIf="themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg *ngIf="!themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </div>
    </div>
</nav>
