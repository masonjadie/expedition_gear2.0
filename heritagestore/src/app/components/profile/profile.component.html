<section class="section profile-container">
    <h1>Account Settings</h1>
    <div class="profile-card" *ngIf="user">
        <div class="profile-header">
            <div class="profile-avatar">{{initials}}</div>
            <div class="user-meta">
                <h2>{{user.name}}</h2>
                <p>Member since {{user.created_at | date:'yyyy'}}</p>
            </div>
        </div>
        <form class="profile-form">
            <h3>Personal Information</h3>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" [value]="user.email" readonly>
            </div>
            <div class="form-group">
                <label for="address">Shipping Address</label>
                <textarea id="address" placeholder="Enter your shipping address...">{{user.address || 'No address set'}}</textarea>
            </div>
            
            <h3>Payment Methods</h3>
            <div class="payment-methods">
                <div class="card-display">
                    <span class="card-icon">💳</span>
                    <span class="card-details">Visa ending in 4242</span>
                    <span class="card-expiry">Expires 12/26</span>
                </div>
                <button type="button" class="btn-link">Add New Card</button>
            </div>

            <button type="button" class="btn btn-primary" style="margin-top: 2rem;">Save Changes</button>
        </form>
    </div>
    <div *ngIf="!user" class="empty-state">
        <p>Please log in to view your profile.</p>
        <a routerLink="/login" class="btn btn-primary">Log In</a>
    </div>
</section>
