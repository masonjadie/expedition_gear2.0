[build]
  command = "node node_modules/@angular/cli/bin/ng build --configuration production"
  publish = "dist/heritagestore"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-lived cache for hashed asset files (JS, CSS bundles)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for index.html (no hash, must always be fresh)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets (images, fonts, icons)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
